# Deprecated CI definition.
# GitHub Actions (.github/workflows/ci.yml) is the authoritative pipeline
# used for tests, builds, and GitHub releases.
# This file is kept only for legacy/self-hosted GitLab compatibility.

stages:
  - build
  - test

variables:
  GO_VERSION: "1.24"
  GOPATH: "$CI_PROJECT_DIR/go"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go-build"

before_script:
  - mkdir -p $GOCACHE

build:
  stage: build
  image: golang:$GO_VERSION
  script:
    - go mod tidy
    - go build -o slsbench ./cmd/slsbench
  artifacts:
    paths:
      - slsbench

test:
  stage: test
  image: golang:$GO_VERSION
  script:
    - go test ./internal/service/flowgen ./internal/service/datagen ./internal/service/dslvalidator ./internal/service/bodyprobe ./internal/service/harness
