openapi: 3.0.3
info:
  title: Petclinic Mini
  version: "1.0"
paths:
  /users:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: ok
components:
  schemas:
    User:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 80
        password:
          type: string
          minLength: 8
          maxLength: 80
        enabled:
          type: boolean
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
      required:
        - username
    Role:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
      required:
        - name
